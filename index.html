<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For My Betu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
 font-family:'Poppins',sans-serif;
 text-align:center;
 background:linear-gradient(135deg,#fff0f5,#ffe4e1);
 color:#d63384;
 overflow-x:hidden;
}

h1 { font-family:'Pacifico',cursive; }

.hidden { display:none; }

button {
 padding:12px 25px;
 border:none;
 background:#ff4d6d;
 color:white;
 border-radius:25px;
 margin:10px;
 cursor:pointer;
 font-size:16px;
 transition:0.3s;
}
button:hover { transform:scale(1.05); }

.bigBtn { font-size:20px; padding:15px 35px; }

.fade { animation:fadeIn .8s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.heart {
 position:fixed;
 bottom:-20px;
 font-size:20px;
 animation:float 6s linear infinite;
}
@keyframes float { to { transform:translateY(-100vh); opacity:0; } }

/* SLIDER */
#slider { width:80%; margin-top:30px; }

/* PUZZLE */
.grid { display:grid; gap:5px; justify-content:center; margin:20px auto; }
.tile { width:90px; height:90px; border-radius:10px; cursor:pointer; background-repeat:no-repeat; }

/* LETTER */
#loveLetter {
 max-width:600px;
 margin:auto;
 font-size:18px;
 line-height:1.6;
}

/* IMAGE */
#slideImg {
 width:250px;
 border-radius:15px;
 box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h1>💖 For My Betu 💖</h1>

<p>Swipe to unlock our story 💕</p>
<input type="range" min="0" max="100" value="0" id="slider">

<div id="main" class="hidden">
<button onclick="startStory()">Start Our Journey 💖</button>
<div id="game"></div>
<div id="quiz" class="hidden"></div>
<div id="final" class="hidden"></div>
</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* SLIDER UNLOCK */
document.getElementById("slider").oninput = function(){
 if(this.value > 90){
   document.getElementById("main").classList.remove("hidden");
 }
};

/* HEARTS */
setInterval(()=>{
 const h=document.createElement('div');
 h.className='heart';
 h.innerHTML='💖';
 h.style.left=Math.random()*100+'vw';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},500);

/* DATE LOCK */
function checkDate(){
 let input = prompt("Enter our anniversary date (DDMMYYYY) 💖");
 if(input !== "04042024"){
   alert("Wrong date 😢");
   location.reload();
 }
}

/* START */
function startStory(){
 checkDate();
 document.getElementById('bgMusic').play();
 startQuiz();
}

/* QUIZ */
const quizData=[
{q:"When did we first meet?",options:["04 Apr 24","07 Apr 24","12 Oct 23"],correct:1},
{q:"Our first memory?",options:["Combi & Ice Cream","Movie","Shopping"],correct:0},
{q:"Our first trip?",options:["Mathura","Delhi","Goa"],correct:0},
];

let qIndex=0, selected=null;

function startQuiz(){
 document.getElementById('quiz').classList.remove('hidden');
 showQ();
}

function showQ(){
 const q=quizData[qIndex];
 const div=document.getElementById('quiz');
 div.innerHTML=`<h2>${q.q}</h2>`;
 q.options.forEach((o,i)=>{
 div.innerHTML+=`<button onclick="selectAns(${i},this)">${o}</button><br>`;
 });
 div.innerHTML+=`<br><button onclick="nextQ()">Next</button>`;
}

function selectAns(i,el){
 selected=i;
 document.querySelectorAll('#quiz button').forEach(b=>b.style.background='#ff4d6d');
 el.style.background='green';
}

function nextQ(){
 if(selected===null) return alert("Choose one");
 if(selected!==quizData[qIndex].correct){
 document.getElementById('quiz').innerHTML="<h2>❌ Try again</h2>";
 return;
 }
 selected=null;
 qIndex++;
 if(qIndex<quizData.length) showQ();
 else showFinal();
}

/* FINAL */
function showFinal(){
 document.getElementById('quiz').classList.add('hidden');
 const final=document.getElementById('final');
 final.classList.remove('hidden');

 final.innerHTML = `
 <div class="fade">

 <div id="slideshow">
   <img id="slideImg" src="photo1.jpg">
 </div>

 <br><div id="loveLetter"></div>

 <br><br>
 <div style="font-size:22px;">
 💖 You are my today and all of my tomorrows 💖
 <br><br>
 Will you stay with me forever? 💍
 <br><br>
 <button class="bigBtn" onclick="yes()">YES 💖</button>
 </div>

 </div>
 `;

 startSlideshow();
 typeLetter();
}

/* SLIDESHOW */
const slides=["photo1.jpg","photo2.jpg","photo3.jpg"];
let si=0;

function startSlideshow(){
 setInterval(()=>{
   si=(si+1)%slides.length;
   document.getElementById("slideImg").src=slides[si];
 },2000);
}

/* TYPEWRITER LETTER */
const text = `From that esports tournament...
I never knew that a simple meeting would become the most beautiful part of my life.

On 7th April, when we met...
those small moments like eating combi and ice cream became memories I’ll never forget.

And when I saw you crying a little when I was leaving...
that’s when I realized you are something special.

From Mathura to Agra to Mahakaleshwar...
every place became meaningful because you were with me.

You gave me happiness, trust, and a love I never imagined.

Thank you for coming into my life, Betu.

I don’t just love you...
I truly, deeply, endlessly love you. 💖`;

let ti=0;

function typeLetter(){
 const el=document.getElementById("loveLetter");
 if(ti<text.length){
   el.innerHTML+=text.charAt(ti);
   ti++;
   setTimeout(typeLetter,40);
 }
}

/* FINAL YES */
function yes(){
 document.getElementById('final').innerHTML="<h1>💖 Forever Together 💖<br><br>I Love You Betu 💕</h1>";
}

/* MUSIC TOGGLE */
function toggleMusic(){
 const m=document.getElementById('bgMusic');
 if(m.paused) m.play();
 else m.pause();
}

</script>

</body>
</html>
