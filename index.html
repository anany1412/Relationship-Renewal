<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For My Betu 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
 font-family:'Poppins',sans-serif;
 text-align:center;
 background:linear-gradient(135deg,#fff0f5,#ffe4e1);
 color:#d63384;
 overflow:hidden;
}
h1 { font-family:'Pacifico',cursive; }

button {
 padding:12px 25px;
 border:none;
 background:#ff4d6d;
 color:white;
 border-radius:25px;
 margin:10px;
 cursor:pointer;
}

.bigBtn { font-size:20px; }

#slider { width:80%; }

.hidden { display:none; }

/* PUZZLE */
.grid { display:grid; gap:5px; justify-content:center; margin:20px auto; }
.tile { width:90px; height:90px; border-radius:10px; cursor:pointer; background-repeat:no-repeat; }

/* HEARTS */
.heart {
 position:fixed;
 bottom:-20px;
 animation:float 6s linear infinite;
 text-shadow:0 0 10px pink,0 0 20px hotpink;
}
@keyframes float { to { transform:translateY(-100vh); opacity:0; } }

/* IMAGE */
#slideImg { width:250px; border-radius:15px; }

/* LETTER */
#loveLetter { max-width:600px; margin:auto; }

</style>
</head>

<body>

<h1>💖 For My Betu 💖</h1>

<p>Swipe to unlock 💕</p>
<input type="range" id="slider" min="0" max="100">

<div id="main" class="hidden">
<button onclick="startStory()">Start 💖</button>

<div id="game"></div>
<div id="quiz" class="hidden"></div>
<div id="extraQuiz" class="hidden"></div>
<div id="final" class="hidden"></div>
</div>

<audio id="bgMusic" loop>
<source src="music.mp3">
</audio>

<audio id="voiceMsg">
<source src="voice.mp3">
</audio>

<script>

/* SLIDER */
slider.oninput=function(){
 if(this.value>90){
  main.classList.remove("hidden");
 }
}

/* HEARTS */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},500);

/* START */
function startStory(){
 document.getElementById("bgMusic").play();
 startStage(0);
}

/* PUZZLE STAGES */
const images=["stage1.jpg","stage2.jpg","stage3.jpg"];
const sizes=[3,4,5];

let currentStage=0, selected=null;

function startStage(stage){
 currentStage=stage;
 loadGame();
}

function loadGame(){
 const size=sizes[currentStage];
 const game=document.getElementById('game');
 game.innerHTML=`<h2>Stage ${currentStage+1}</h2>`;

 const grid=document.createElement('div');
 grid.className='grid';
 grid.style.gridTemplateColumns=`repeat(${size},90px)`;

 let tiles=[...Array(size*size).keys()].sort(()=>Math.random()-0.5);

 tiles.forEach(value=>{
  const tile=document.createElement('div');
  tile.className='tile';

  const x=value%size;
  const y=Math.floor(value/size);

  tile.style.backgroundImage=`url(${images[currentStage]})`;
  tile.style.backgroundSize=`${size*90}px ${size*90}px`;
  tile.style.backgroundPosition=`-${x*90}px -${y*90}px`;
  tile.dataset.correct=value;

  tile.onclick=()=>selectTile(tile);
  grid.appendChild(tile);
 });

 game.appendChild(grid);
}

function selectTile(tile){
 if(!selected){
  selected=tile;
  tile.style.border="3px solid red";
 } else {
  let tempPos=selected.style.backgroundPosition;
  let tempCorrect=selected.dataset.correct;

  selected.style.backgroundPosition=tile.style.backgroundPosition;
  selected.dataset.correct=tile.dataset.correct;

  tile.style.backgroundPosition=tempPos;
  tile.dataset.correct=tempCorrect;

  selected.style.border="none";
  selected=null;
  checkWin();
 }
}

function checkWin(){
 const tiles=document.querySelectorAll('.tile');
 let correct=true;

 tiles.forEach((tile,i)=>{
  if(parseInt(tile.dataset.correct)!==i) correct=false;
 });

 if(correct){
  if(currentStage<2){
   startStage(currentStage+1);
  } else {
   startQuiz();
  }
 }
}

/* ORIGINAL QUIZ */
const quizData=[
{q:"Question 1: When did we first meet?",options:["16 Dec 25","04 Apr 24","12 Oct 23","18 Apr 24"],correct:1},
{q:"Question 2: Our favorite Thing And place?",options:["Staying At Home","Wondering Together Holding Hands Without a plan","Going on A vaccaion","Spend The Most Time Together"],correct:3},
{q:"Question 3: Best memory?",options:["We went to mathura","We did boating","We went Agra","All of the above"],correct:3},
{q:"Question 4: Where I Gave You Your First Soft Toy?",options:["Bhopal","Delhi","Jaipur","Agra"],correct:2},
{q:"Question 5: Will We Always Be Forever & together? 💖",options:["Yes","Always","Forever","100%"],correct:2}
];

let qi=0, sel=null;

function startQuiz(){
 game.innerHTML="";
 quiz.classList.remove("hidden");
 showQ();
}

function showQ(){
 let q=quizData[qi];
 quiz.innerHTML=`<h2>${q.q}</h2>`;
 q.options.forEach((o,i)=>{
  quiz.innerHTML+=`<button onclick="ans(${i},this)">${o}</button><br>`;
 });
 quiz.innerHTML+=`<button onclick="next()">Next ➡️</button>`;
}

function ans(i,e){
 sel=i;
 document.querySelectorAll("#quiz button").forEach(b=>b.style.background="#ff4d6d");
 e.style.background="green";
}

function next(){
 if(sel===null) return alert("Select one!");
 if(sel!=quizData[qi].correct){
  location.reload();
 }
 sel=null;
 qi++;
 if(qi<quizData.length) showQ();
 else startExtraQuiz();
}

/* EXTRA QUIZ */
const extra=[
{q:"Do you love me forever? 💖",options:["Yes","Always","Forever"],correct:2},
{q:"Who am I to you?",options:["Your person","Your everything","Your love"],correct:1}
];

let eq=0, es=null;

function startExtraQuiz(){
 quiz.classList.add("hidden");
 extraQuiz.classList.remove("hidden");
 showExtra();
}

function showExtra(){
 let q=extra[eq];
 extraQuiz.innerHTML=`<h2>${q.q}</h2>`;
 q.options.forEach((o,i)=>{
  extraQuiz.innerHTML+=`<button onclick="eAns(${i},this)">${o}</button><br>`;
 });
 extraQuiz.innerHTML+=`<button onclick="nextExtra()">Next</button>`;
}

function eAns(i,e){
 es=i;
 document.querySelectorAll("#extraQuiz button").forEach(b=>b.style.background="#ff4d6d");
 e.style.background="green";
}

function nextExtra(){
 if(es===null) return alert("Select one!");
 es=null;
 eq++;
 if(eq<extra.length) showExtra();
 else showFinal();
}

/* FINAL */
function showFinal(){
 extraQuiz.classList.add("hidden");
 final.classList.remove("hidden");

 final.innerHTML=`
 <img id="slideImg" src="photo1.jpg">
 <div id="loveLetter"></div>
 <div id="countdown"></div>
 `;

 startSlide();
 typeLetter();
 voiceMsg.play();
 startCountdown();
}

/* SLIDESHOW (photo1 → photo5) */
let slides=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg"];
let si=0;

function startSlide(){
 setInterval(()=>{
  si=(si+1)%slides.length;
  slideImg.src=slides[si];
 },2000);
}

/* LETTER */
const text=`From that esports tournament...
I never knew that a simple meeting would become the most beautiful part of my life...

Thank you for coming into my life Betu...
I truly love you 💖`;

let ti=0;

function typeLetter(){
 if(ti<text.length){
  loveLetter.innerHTML+=text[ti];
  ti++;
  setTimeout(typeLetter,40);
 }
}

/* COUNTDOWN */
function startCountdown(){
 let c=5;
 let i=setInterval(()=>{
  countdown.innerHTML="⏳ "+c;
  c--;
  if(c<0){
   clearInterval(i);
   countdown.innerHTML=`
   💖 Will you stay with me forever? 💍
   <br><button class="bigBtn" onclick="yes()">YES 💖</button>
   `;
  }
 },1000);
}

function yes(){
 document.body.innerHTML="<h1>💖 FOREVER 💖</h1>";
}

</script>

</body>
</html>
