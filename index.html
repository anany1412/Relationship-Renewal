<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Relationship Renewal 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body { font-family:'Poppins',sans-serif; text-align:center; background:linear-gradient(135deg,#fff0f5,#ffe4e1); color:#d63384; }
h1 { font-family:'Pacifico',cursive; }
.hidden { display:none; }
.grid { display:grid; gap:5px; justify-content:center; margin:20px auto; }
.tile { width:90px; height:90px; border-radius:10px; cursor:pointer; background-repeat:no-repeat; transition:transform .2s; }
.tile:hover { transform:scale(1.05); }
button { padding:12px 25px; border:none; background:#ff4d6d; color:white; border-radius:25px; margin:10px; cursor:pointer; font-size:16px; }
.locked { opacity:0.5; }

/* Confetti */
.confetti { position:fixed; width:8px; height:8px; top:0; animation:fall 3s linear forwards; }
@keyframes fall { to { transform:translateY(100vh) rotate(720deg); opacity:0; } }

/* Pop animation */
.pop { animation:pop .3s ease; }
@keyframes pop { 0%{transform:scale(0.8);} 100%{transform:scale(1);} }

/* Fade */
.fade { animation:fadeIn .5s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>

<h1>💖 Relationship Renewal 💖</h1>

<button id="startBtn" onclick="startRenewal()">Start Renewal 💕</button>

<div id="stageButtons" class="hidden">
<button onclick="startStage(0)">Stage 1</button>
<button id="btn2" class="locked" disabled onclick="startStage(1)">Stage 2</button>
<button id="btn3" class="locked" disabled onclick="startStage(2)">Stage 3</button>
</div>

<div id="game"></div>
<div id="quiz" class="hidden"></div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const images=["stage1.jpg","stage2.jpg","stage3.jpg"];
const sizes=[3,4,5];

let currentStage=0;
let selected=null;

function startRenewal(){
 document.getElementById('startBtn').style.display='none';
 document.getElementById('stageButtons').classList.remove('hidden');
}

function startStage(stage){
 document.getElementById('bgMusic').play();
 currentStage=stage;
 loadGame();
}

function loadGame(){
 const size=sizes[currentStage];
 const game=document.getElementById('game');
 game.innerHTML=`<h2 class='fade'>Stage ${currentStage+1}</h2>`;

 const grid=document.createElement('div');
 grid.className='grid';
 grid.style.gridTemplateColumns=`repeat(${size},90px)`;

 let tiles=[...Array(size*size).keys()];
 tiles.sort(()=>Math.random()-0.5);

 tiles.forEach((value,i)=>{
 const tile=document.createElement('div');
 tile.className='tile pop';
 const x=value%size;
 const y=Math.floor(value/size);

 tile.style.backgroundImage=`url(${images[currentStage]})`;
 tile.style.backgroundSize=`${size*90}px ${size*90}px`;
 tile.style.backgroundPosition=`-${x*90}px -${y*90}px`;

 tile.dataset.correct=value;
 tile.onclick=()=>selectTile(tile);
 grid.appendChild(tile);
 });

 game.appendChild(grid);
}

function selectTile(tile){
 tile.classList.add('pop');
 if(!selected){
 selected=tile;
 tile.style.border="3px solid red";
 } else {
 let tempPos=selected.style.backgroundPosition;
 let tempCorrect=selected.dataset.correct;

 selected.style.backgroundPosition=tile.style.backgroundPosition;
 selected.dataset.correct=tile.dataset.correct;

 tile.style.backgroundPosition=tempPos;
 tile.dataset.correct=tempCorrect;

 selected.style.border="none";
 selected=null;
 checkWin();
 }
}

function checkWin(){
 const tiles=document.querySelectorAll('.tile');
 let correct=true;

 tiles.forEach((tile,i)=>{
 if(parseInt(tile.dataset.correct)!==i){ correct=false; }
 });

 if(correct){
 confettiBlast();

 if(currentStage===0){ unlock('btn2'); }
 if(currentStage===1){ unlock('btn3'); }

 if(currentStage===2){ setTimeout(startQuiz,1200); }
 }
}

function unlock(id){
 const btn=document.getElementById(id);
 btn.disabled=false;
 btn.classList.remove('locked');
}

function confettiBlast(){
 for(let i=0;i<120;i++){
 const c=document.createElement('div');
 c.className='confetti';
 c.style.left=Math.random()*100+'vw';
 c.style.background=['#ff4d6d','#ff99ac','#ffc2d1','#ffccd5'][Math.floor(Math.random()*4)];
 document.body.appendChild(c);
 setTimeout(()=>c.remove(),3000);
 }
}

// QUIZ
const quizData=[
{q:"Question 1: When did we first meet?",options:["A","B","C","D"],correct:0},
{q:"Question 2: Our favorite place?",options:["A","B","C","D"],correct:1},
{q:"Question 3: Best memory?",options:["A","B","C","D"],correct:2},
{q:"Question 4: What do you love most?",options:["A","B","C","D"],correct:3},
{q:"Question 5: Forever together? 💖",options:["Yes","Always","Forever","100%"],correct:3}
];

let qIndex=0;
let selectedAnswer=null;

function startQuiz(){
 document.getElementById('game').innerHTML="";
 const quiz=document.getElementById('quiz');
 quiz.classList.remove('hidden');
 qIndex=0;
 showQuestion();
}

function showQuestion(){
 const q=quizData[qIndex];
 const quiz=document.getElementById('quiz');

 quiz.innerHTML=`<h2 class='fade'>${q.q}</h2>`;

 q.options.forEach((opt,i)=>{
 quiz.innerHTML+=`<button onclick='selectAnswer(${i})'>${opt}</button><br>`;
 });

 quiz.innerHTML+=`<br><button onclick='nextQ()'>Next ➡️</button>`;
}

function selectAnswer(i){
 selectedAnswer=i;
 document.querySelectorAll('#quiz button').forEach(b=>b.style.background='#ff4d6d');
 event.target.style.background='#28a745';
}

function nextQ(){
 if(selectedAnswer===null) return alert('Select an answer!');

 if(selectedAnswer!==quizData[qIndex].correct){
 document.getElementById('quiz').innerHTML=`<h2>❌ Wrong Answer</h2><button onclick='location.reload()'>Start Again</button>`;
 return;
 }

 selectedAnswer=null;
 qIndex++;

 if(qIndex<quizData.length){ showQuestion(); }
 else{
 document.getElementById('quiz').innerHTML="<h2>💖 Relationship Renewed 💖</h2>";
 confettiBlast();
 }
}
</script>

</body>
</html>
